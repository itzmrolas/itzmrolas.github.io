<html lang="en">
<head>
<meta charset="UTF-8">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #05060a;
    font-family: Arial, sans-serif;
    color: white;
    user-select: none;
}

/* canvas */
#particles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* glow */
.glow {
    position: absolute;
    width: 1500px;
    height: 1500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,120,255,0.35), transparent 65%);
    filter: blur(120px);
    mix-blend-mode: screen;
    z-index: 1;
    animation: move 18s ease-in-out infinite;
}

.glow:nth-child(2) {
    width: 1700px;
    height: 1700px;
    background: radial-gradient(circle, rgba(120,180,255,0.18), transparent 70%);
    animation-duration: 24s;
}

.glow:nth-child(3) {
    width: 1600px;
    height: 1600px;
    background: radial-gradient(circle, rgba(0,120,255,0.12), transparent 75%);
    animation-duration: 30s;
}

@keyframes move {
    0% { transform: translate(-30%, -30%); }
    50% { transform: translate(30%, 25%); }
    100% { transform: translate(-30%, -30%); }
}

/* content */
.content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 5rem;
    letter-spacing: 6px;
}

/* buttons */
.links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center; /* Added to keep things centered if it wraps */
    margin-top: 20px;
}

.links a {
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.03);
    transition: 0.2s;
}

.links a:hover {
    transform: translateY(-2px);
    border-color: rgba(0,120,255,0.8);
    background: rgba(0,120,255,0.25);
    box-shadow: 0 0 25px rgba(0,120,255,0.4);
}

/* ===== CONSOLE (TOP LAYER + DRAG FIX) ===== */
.console {
    position: fixed;
    bottom: 20px;
    left: 20px;

    width: 280px;
    height: 180px;

    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(0,120,255,0.4);
    border-radius: 10px;
    backdrop-filter: blur(10px);

    z-index: 999999; /* 🔥 TOP LAYER FIX */

    overflow: hidden;
}

.console-header {
    padding: 8px;
    background: rgba(0,120,255,0.2);
    cursor: grab;
    font-weight: bold;
}

.console input {
    width: 100%;
    padding: 8px;
    border: none;
    outline: none;
    background: transparent;
    color: white;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.console-output {
    height: 110px;
    overflow-y: auto;
    padding: 8px;
    font-size: 12px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="glow"></div>
<div class="glow"></div>
<div class="glow"></div>

<div class="content">
    <h1>ITZMROLAS</h1>

    <div class="links">
        <a href="https://www.tiktok.com/@itzmrolas">TikTok</a>
        <a href="https://www.instagram.com/itzmrolas">Instagram</a>
        <a href="https://www.youtube.com/@itzmrolas">YouTube</a>
        <a href="https://open.spotify.com/user/31lk4chceqkrc6xcaa2kurtlyfbm">Spotify</a>
        <a href="https://itzmrolas.github.io/playarythmgame/" target="_blank">Rythm Game</a>
    </div>
</div>

<div id="console" class="console hidden">
    <div class="console-header" id="consoleHeader">DEV CONSOLE</div>
    <input id="consoleInput" placeholder="Type command..." autocomplete="off" />
    <div id="consoleOutput" class="console-output"></div>
</div>

<script>
/* ===== STARS ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Star {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.2;
        this.speedX = (Math.random() - 0.5) * 0.15;
        this.speedY = (Math.random() - 0.5) * 0.15;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
    }

    draw() {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

let stars = [];
for (let i = 0; i < 70; i++) stars.push(new Star());

function animate() {
    ctx.fillStyle = "rgba(5,6,10,0.35)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    stars.forEach(s => { s.update(); s.draw(); });
    requestAnimationFrame(animate);
}
animate();

/* ===== CONSOLE ===== */
const consoleBox = document.getElementById("console");
const input = document.getElementById("consoleInput");
const output = document.getElementById("consoleOutput");
const header = document.getElementById("consoleHeader");

/* toggle */
window.addEventListener("keydown", (e) => {
    if (e.key === "/" && document.activeElement !== input) {
        e.preventDefault();
        consoleBox.classList.toggle("hidden");
        input.focus();
    }

    if (e.key === "Escape") {
        consoleBox.classList.add("hidden");
    }
});

function log(msg) {
    output.innerHTML += `<div>> ${msg}</div>`;
    output.scrollTop = output.scrollHeight;
}

/* commands */
input.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;

    const cmd = input.value.trim();
    input.value = "";

    if (cmd === "/time") log(new Date().toLocaleTimeString());
    else if (cmd === "/name") log("my name is alex");
    else if (cmd === "/mail") log("Contact me: itzmrolas@outlook.com");
    else if (cmd === "/chess") {
        window.open("https://www.chess.com", "_blank");
        log("opening chess.com");
    }
    else if (cmd === "/rythm game") {
        window.open("https://itzmrolas.github.io/playarythmgame/", "_blank");
        log("opening rythm game");
    }
    else if (cmd === "/help") {
        log("Commands:");
        log("/time");
        log("/open yt | tiktok | insta | spotify");
        log("/chess");
        log("/mail");
        log("/rythm game");
    }
    else if (cmd.startsWith("/open")) {
        const arg = cmd.split(" ")[1];

        const links = {
            yt: "https://www.youtube.com/@itzmrolas",
            youtube: "https://www.youtube.com/@itzmrolas",
            tiktok: "https://www.tiktok.com/@itzmrolas",
            insta: "https://www.instagram.com/itzmrolas",
            instagram: "https://www.instagram.com/itzmrolas",
            spotify: "https://open.spotify.com/user/31lk4chceqkrc6xcaa2kurtlyfbm"
        };

        if (links[arg]) window.open(links[arg], "_blank");
        else log("unknown platform");
    }
    else log("unknown command");
});

/* ===== DRAG CONSOLE (FIXED TOP LAYER DRAG) ===== */
let dragging = false;
let offsetX = 0;
let offsetY = 0;

header.addEventListener("mousedown", (e) => {
    dragging = true;

    offsetX = e.clientX - consoleBox.offsetLeft;
    offsetY = e.clientY - consoleBox.offsetTop;

    document.body.style.cursor = "grabbing";
});

document.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    consoleBox.style.left = (e.clientX - offsetX) + "px";
    consoleBox.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
    dragging = false;
    document.body.style.cursor = "default";
});
</script>

</body>
</html>
