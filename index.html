<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITZMROLAS</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    background: #05060a;
}

/* PS4-style waves */
.wave {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(0,120,255,0.25), transparent 60%);
    filter: blur(80px);
    animation: move 15s infinite linear;
}

.wave:nth-child(2) { animation-duration: 22s; opacity: 0.6; }
.wave:nth-child(3) { animation-duration: 30s; opacity: 0.4; }

@keyframes move {
    0% { transform: translate(-20%, -20%) rotate(0deg); }
    50% { transform: translate(10%, 10%) rotate(180deg); }
    100% { transform: translate(-20%, -20%) rotate(360deg); }
}

/* content */
.content {
    position: relative;
    z-index: 2;
    text-align: center;
}

h1 {
    font-size: 5rem;
    letter-spacing: 4px;
}

.name {
    margin-top: 10px;
    margin-bottom: 30px;
    font-size: 1.2rem;
    color: #b8c7ff;
}

.links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

.links a {
    color: white;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 12px 18px;
    border-radius: 12px;
    transition: 0.25s;
}

.links a:hover {
    background: rgba(0,120,255,0.3);
    border-color: rgba(0,120,255,0.8);
}
</style>
</head>

<body>

<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<div class="content">
    <h1>ITZMROLAS</h1>
    <div class="name">Aleksander Świgost</div>

    <div class="links">
        <a href="https://www.tiktok.com/@itzmrolas" target="_blank">TikTok</a>
        <a href="https://www.instagram.com/itzmrolas" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/@itzmrolas" target="_blank">YouTube</a>
        <a href="https://open.spotify.com/user/31lk4chceqkrc6xcaa2kurtlyfbm" target="_blank">Spotify</a>
    </div>
</div>

</body>
</html>
