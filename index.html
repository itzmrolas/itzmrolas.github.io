<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITZMROLAS</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #05060a;
    font-family: Arial, sans-serif;
    color: white;
}

/* Stars */
#particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* Glow (original style kept) */
.glow {
    position: absolute;
    width: 1500px;
    height: 1500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,120,255,0.35), transparent 65%);
    filter: blur(120px);
    opacity: 0.95;
    mix-blend-mode: screen;
    z-index: 1;
    animation: move 18s ease-in-out infinite;
}

.glow:nth-child(2) {
    width: 1700px;
    height: 1700px;
    background: radial-gradient(circle, rgba(120,180,255,0.18), transparent 70%);
    animation-duration: 24s;
    opacity: 0.7;
}

.glow:nth-child(3) {
    width: 1600px;
    height: 1600px;
    background: radial-gradient(circle, rgba(0,120,255,0.12), transparent 75%);
    animation-duration: 30s;
    opacity: 0.5;
}

@keyframes move {
    0%   { transform: translate(-30%, -30%); }
    50%  { transform: translate(30%, 25%); }
    100% { transform: translate(-30%, -30%); }
}

/* Content */
.content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 5rem;
    letter-spacing: 6px;
    text-shadow: 0 0 35px rgba(0,140,255,0.7);
}

.name {
    margin-top: 10px;
    margin-bottom: 30px;
    font-size: 1.2rem;
    color: #b8c7ff;
}

.links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

.links a {
    color: white;
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.03);
    transition: 0.2s;
}

.links a:hover {
    transform: translateY(-2px);
    border-color: rgba(0,120,255,0.8);
    background: rgba(0,120,255,0.25);
    box-shadow: 0 0 25px rgba(0,120,255,0.4);
}

/* ✉️ EMAIL */
.email {
    margin-top: 18px;
    font-size: 1rem;
    color: #b8c7ff;
    opacity: 0.9;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="glow"></div>
<div class="glow"></div>
<div class="glow"></div>

<div class="content">
    <h1>ITZMROLAS</h1>

    <div class="links">
        <a href="https://www.tiktok.com/@itzmrolas" target="_blank">TikTok</a>
        <a href="https://www.instagram.com/itzmrolas" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/@itzmrolas" target="_blank">YouTube</a>
        <a href="https://open.spotify.com/user/31lk4chceqkrc6xcaa2kurtlyfbm" target="_blank">Spotify</a>
    </div>

    <div class="email">itzmrolas@outlook.com</div>
</div>

<script>
// Stars (unchanged)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

class Star {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.2;
        this.speedX = (Math.random() - 0.5) * 0.15;
        this.speedY = (Math.random() - 0.5) * 0.15;
        this.opacity = Math.random();
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;

        this.opacity += (Math.random() - 0.5) * 0.03;
        this.opacity = Math.max(0.2, Math.min(0.9, this.opacity));
    }

    draw() {
        ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    stars = [];
    for (let i = 0; i < 70; i++) {
        stars.push(new Star());
    }
}

function animate() {
    ctx.fillStyle = "rgba(5,6,10,0.35)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let s of stars) {
        s.update();
        s.draw();
    }

    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});
</script>

</body>
</html>
