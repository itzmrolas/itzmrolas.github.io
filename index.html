<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITZMROLAS</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    /* Darker, neutral gradient with barely a hint of color */
    background: linear-gradient(135deg, #050608 0%, #12141a 50%, #050608 100%);
    font-family: 'Montserrat', sans-serif;
    color: white;
    user-select: none;
}

/* canvas for ribbons */
#particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* Subtly moving ambient glow */
.glow {
    position: absolute;
    width: 1500px;
    height: 1500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.03), transparent 60%);
    filter: blur(100px);
    mix-blend-mode: screen;
    z-index: 1;
    animation: move 20s ease-in-out infinite;
    pointer-events: none;
}

.glow:nth-child(2) {
    width: 1800px;
    height: 1800px;
    background: radial-gradient(circle, rgba(100, 150, 255, 0.02), transparent 70%);
    animation-duration: 28s;
    animation-direction: reverse;
}

@keyframes move {
    0% { transform: translate(-20%, -20%); }
    50% { transform: translate(20%, 20%); }
    100% { transform: translate(-20%, -20%); }
}

/* content */
.content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 5rem;
    font-weight: 300;
    letter-spacing: 12px;
    text-transform: uppercase;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    margin-bottom: 10px;
}

/* buttons - Transparent & sharper edges */
.links {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
}

.links a {
    padding: 14px 28px;
    border-radius: 4px; /* Less rounded */
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-decoration: none;
    color: white;
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: 1px;
    background: transparent; /* Fully transparent back */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s ease;
}

.links a:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.6);
    background: rgba(255, 255, 255, 0.05); /* Slight fill on hover */
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}

/* ===== CONSOLE (TRANSPARENT & SHARPER EDGES) ===== */
.console {
    position: fixed;
    bottom: 30px;
    left: 30px;

    width: 320px;
    height: 220px;

    background: rgba(0, 0, 0, 0.2); /* Very transparent */
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 4px; /* Less rounded */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);

    z-index: 999999;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.console.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
}

.console-header {
    padding: 10px 15px;
    background: rgba(255, 255, 255, 0.03);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    cursor: grab;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1px;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.console-header::after {
    content: "Press ESC to close";
    font-size: 0.65rem;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.4);
}

.console-header:active {
    cursor: grabbing;
}

.console-output {
    flex-grow: 1;
    overflow-y: auto;
    padding: 12px;
    font-size: 13px;
    font-family: monospace;
    color: #ccc;
    line-height: 1.4;
}

.console-output div {
    margin-bottom: 4px;
}

.console input {
    width: 100%;
    padding: 12px;
    border: none;
    outline: none;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-family: monospace;
    font-size: 13px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}
.console input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

/* Custom Scrollbar for console */
.console-output::-webkit-scrollbar {
    width: 6px;
}
.console-output::-webkit-scrollbar-track {
    background: transparent;
}
.console-output::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="glow"></div>
<div class="glow"></div>

<div class="content">
    <h1>ITZMROLAS</h1>

    <div class="links">
        <a href="https://www.tiktok.com/@itzmrolas" target="_blank">TikTok</a>
        <a href="https://www.instagram.com/itzmrolas" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/@itzmrolas" target="_blank">YouTube</a>
        <a href="https://open.spotify.com/user/31lk4chceqkrc6xcaa2kurtlyfbm" target="_blank">Spotify</a>
        <a href="https://itzmrolas.github.io/playarythmgame/" target="_blank">Rythm Game</a>
    </div>
</div>

<div id="console" class="console hidden">
    <div class="console-header" id="consoleHeader">DEV CONSOLE</div>
    <div id="consoleOutput" class="console-output">
        <div style="color: #fff;">> System initialized. Type /help for commands.</div>
    </div>
    <input id="consoleInput" placeholder="Type command..." autocomplete="off" spellcheck="false" />
</div>

<script>
/* ===== RIBBON CANVAS ANIMATION (Muted Colors) ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let time = 0;

function animate() {
    ctx.clearRect(0, 0, width, height);
    time += 0.003;

    // Desaturated, transparent waves
    const waves = [
        { amplitude: 120, frequency: 0.001, speed: 1.5, color: "rgba(255, 255, 255, 0.02)", glow: "rgba(255, 255, 255, 0.1)", offset: 0 },
        { amplitude: 180, frequency: 0.0015, speed: 1.2, color: "rgba(100, 150, 255, 0.01)", glow: "rgba(100, 150, 255, 0.08)", offset: Math.PI },
        { amplitude: 100, frequency: 0.002, speed: 2.0, color: "rgba(255, 255, 255, 0.01)", glow: "rgba(255, 255, 255, 0.05)", offset: Math.PI / 2 }
    ];

    waves.forEach((w, index) => {
        ctx.beginPath();
        ctx.moveTo(-50, height / 2);

        for (let x = -50; x <= width + 50; x += 30) {
            let y = height / 2 
                + Math.sin(x * w.frequency + time * w.speed + w.offset) * w.amplitude
                + Math.cos(x * w.frequency * 0.5 - time) * 50;
            ctx.lineTo(x, y);
        }

        ctx.lineTo(width + 50, height + 50);
        ctx.lineTo(-50, height + 50);
        ctx.closePath();

        ctx.fillStyle = w.color;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-50, height / 2);
        for (let x = -50; x <= width + 50; x += 30) {
            let y = height / 2 
                + Math.sin(x * w.frequency + time * w.speed + w.offset) * w.amplitude
                + Math.cos(x * w.frequency * 0.5 - time) * 50;
            ctx.lineTo(x, y);
        }
        ctx.lineWidth = 1 + index * 0.5;
        ctx.strokeStyle = w.glow;
        ctx.stroke();
    });

    requestAnimationFrame(animate);
}
animate();

/* ===== CONSOLE LOGIC ===== */
const consoleBox = document.getElementById("console");
const input = document.getElementById("consoleInput");
const output = document.getElementById("consoleOutput");
const header = document.getElementById("consoleHeader");

window.addEventListener("keydown", (e) => {
    if (e.key === "/" && document.activeElement !== input) {
        e.preventDefault();
        consoleBox.classList.toggle("hidden");
        if (!consoleBox.classList.contains("hidden")) {
            input.focus();
        }
    }

    if (e.key === "Escape") {
        consoleBox.classList.add("hidden");
        input.blur();
    }
});

function log(msg, color = "#ccc") {
    output.innerHTML += `<div style="color: ${color};">> ${msg}</div>`;
    output.scrollTop = output.scrollHeight;
}

input.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;

    const cmd = input.value.trim();
    input.value = "";

    if (!cmd) return;

    log(cmd, "#666");

    if (cmd === "/time") log(new Date().toLocaleTimeString());
    else if (cmd === "/name") log("My name is Alex");
    else if (cmd === "/mail") log("Contact me: itzmrolas@outlook.com");
    else if (cmd === "/chess") {
        window.open("https://www.chess.com", "_blank");
        log("Opening Chess.com...", "#fff");
    }
    else if (cmd === "/rythm game" || cmd === "/rythm") {
        window.open("https://itzmrolas.github.io/playarythmgame/", "_blank");
        log("Opening Rythm Game...", "#fff");
    }
    else if (cmd === "/clear") {
        output.innerHTML = "";
    }
    else if (cmd === "/help") {
        log("Available Commands:");
        log("  /time  - Shows current time");
        log("  /name  - Displays my name");
        log("  /mail  - Displays my contact email");
        log("  /chess - Opens chess.com");
        log("  /rythm - Opens my rythm game");
        log("  /open [platform] - Opens specified social link");
        log("  /clear - Clears the console");
    }
    else if (cmd.startsWith("/open")) {
        const arg = cmd.split(" ")[1];

        const links = {
            yt: "https://www.youtube.com/@itzmrolas",
            youtube: "https://www.youtube.com/@itzmrolas",
            tiktok: "https://www.tiktok.com/@itzmrolas",
            insta: "https://www.instagram.com/itzmrolas",
            instagram: "https://www.instagram.com/itzmrolas",
            spotify: "https://open.spotify.com/user/31lk4chceqkrc6xcaa2kurtlyfbm"
        };

        if (links[arg]) {
            window.open(links[arg], "_blank");
            log(`Opening ${arg}...`, "#fff");
        } else {
            log("Unknown platform. Valid options: yt, tiktok, insta, spotify", "#ff6b6b");
        }
    }
    else {
        log("Unknown command. Type /help for a list of commands.", "#ff6b6b");
    }
});

/* ===== DRAG CONSOLE ===== */
let dragging = false;
let offsetX = 0;
let offsetY = 0;

header.addEventListener("mousedown", (e) => {
    dragging = true;
    offsetX = e.clientX - consoleBox.offsetLeft;
    offsetY = e.clientY - consoleBox.offsetTop;
    document.body.style.cursor = "grabbing";
});

document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    let newLeft = e.clientX - offsetX;
    let newTop = e.clientY - offsetY;
    newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - consoleBox.offsetWidth));
    newTop = Math.max(0, Math.min(newTop, window.innerHeight - consoleBox.offsetHeight));
    consoleBox.style.left = newLeft + "px";
    consoleBox.style.top = newTop + "px";
});

document.addEventListener("mouseup", () => {
    if (dragging) {
        dragging = false;
        document.body.style.cursor = "default";
    }
});
</script>

</body>
</html>
